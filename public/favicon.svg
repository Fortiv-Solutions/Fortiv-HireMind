<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Brand red rounded square background -->
  <rect width="32" height="32" rx="7" fill="#a6192e"/>

  <!-- Subtle inner highlight for depth -->
  <rect width="32" height="32" rx="7" fill="url(#shine)" opacity="0.18"/>

  <!-- "UK" lettermark — tight, bold, white -->
  <!-- U -->
  <text
    x="2"
    y="23"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="15"
    fill="white"
    letter-spacing="-0.5"
  >UK</text>

  <!-- Thin bottom rule for the "REALTY" wordmark feel -->
  <rect x="2" y="26" width="28" height="1.5" rx="0.75" fill="white" opacity="0.35"/>

  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
